<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'unsafe-inline'; style-src 'unsafe-inline';">
    <title>Musik-Quiz - 200 Fragen</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 800px;
            width: 100%;
            padding: 40px;
            position: relative;
            z-index: 10;
        }

        h1 {
            color: #764ba2;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .quiz-info {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            text-align: center;
        }

        .progress-bar {
            background: #e0e0e0;
            height: 30px;
            border-radius: 15px;
            margin-bottom: 20px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .question-container {
            margin-bottom: 30px;
        }

        .question {
            font-size: 1.3em;
            color: #333;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .answers {
            display: grid;
            gap: 15px;
        }

        .answer-btn {
            background: #f5f5f5;
            border: 2px solid #ddd;
            padding: 15px 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.1em;
            text-align: left;
        }

        .answer-btn:hover {
            background: #e8e8ff;
            border-color: #667eea;
            transform: translateX(5px);
        }

        .answer-btn.correct {
            background: #4caf50;
            color: white;
            border-color: #4caf50;
        }

        .answer-btn.wrong {
            background: #f44336;
            color: white;
            border-color: #f44336;
        }

        .answer-btn.disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }

        .next-btn, .start-btn, .restart-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 10px;
            font-size: 1.2em;
            cursor: pointer;
            display: block;
            margin: 30px auto 0;
            transition: transform 0.3s ease;
        }

        .next-btn:hover, .start-btn:hover, .restart-btn:hover {
            transform: scale(1.05);
        }

        .result-screen {
            text-align: center;
            display: none;
        }

        .result-screen h2 {
            color: #764ba2;
            font-size: 2.5em;
            margin-bottom: 30px;
        }

        .score-display {
            font-size: 3em;
            color: #667eea;
            margin: 30px 0;
            font-weight: bold;
        }

        .stars {
            font-size: 4em;
            margin: 20px 0;
        }

        .start-screen {
            text-align: center;
        }

        .start-screen p {
            font-size: 1.2em;
            color: #666;
            margin: 20px 0;
        }

        /* Auswahlbereich */
        .selection-section {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
            margin: 20px 0;
            text-align: left;
        }

        .selection-section h3 {
            color: #764ba2;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .checkbox-group {
            display: grid;
            gap: 12px;
            margin: 15px 0;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            padding: 12px;
            background: white;
            border-radius: 8px;
            border: 2px solid #ddd;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .checkbox-item:hover {
            border-color: #667eea;
            background: #f0f0ff;
        }

        .checkbox-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            margin-right: 12px;
            cursor: pointer;
        }

        .checkbox-item label {
            cursor: pointer;
            font-size: 1.1em;
            flex: 1;
        }

        .radio-group {
            display: grid;
            gap: 10px;
            margin: 15px 0;
        }

        .radio-item {
            display: flex;
            align-items: center;
            padding: 12px;
            background: white;
            border-radius: 8px;
            border: 2px solid #ddd;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .radio-item:hover {
            border-color: #667eea;
            background: #f0f0ff;
        }

        .radio-item input[type="radio"] {
            width: 20px;
            height: 20px;
            margin-right: 12px;
            cursor: pointer;
        }

        .radio-item label {
            cursor: pointer;
            font-size: 1.1em;
            flex: 1;
        }

        .custom-number-input {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            background: white;
            border-radius: 8px;
            border: 2px solid #ddd;
        }

        .custom-number-input input[type="number"] {
            width: 100px;
            padding: 8px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 1.1em;
        }

        .error-message {
            color: #f44336;
            background: #ffebee;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            display: none;
        }

        /* Animationen */
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .note {
            position: absolute;
            font-size: 3em;
            animation: float 3s ease-in-out infinite;
            opacity: 0.3;
            pointer-events: none;
        }

        .star {
            position: fixed;
            color: gold;
            font-size: 2em;
            pointer-events: none;
            animation: fall 3s linear;
            z-index: 1000;
        }

        @keyframes fall {
            0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }

        .celebration {
            animation: fadeIn 0.5s ease;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="note" style="top: 10%; left: 10%;">🎵</div>

    <div class="note" style="bottom: 30%; left: 20%; animation-delay: 1s;">🎼</div>
    <div class="note" style="bottom: 20%; right: 25%; animation-delay: 1.5s;">🎵</div>

    <div class="container">
        <h1>🎵 Großes Musik-Quiz 🎵</h1>

        <div id="startScreen" class="start-screen">

                <div class="checkbox-group">

                        <input type="checkbox" id="cat1" value="Instrumente" checked>
                        <label for="cat1">🎺 Instrumente (60 Fragen)</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="cat2" value="Komponisten" checked>
                        <label for="cat2">🎼 Komponisten (60 Fragen)</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="cat3" value="Musicals" checked>
                        <label for="cat3">🎭 Musicals & Musikstücke (40 Fragen)</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="cat4" value="Epochen" checked>
                        <label for="cat4">📜 Musik-Epochen (40 Fragen)</label>
                    </div>
                </div>
            </div>

            <div class="selection-section">
                <h3>🎯 Wie viele Fragen möchtest du?</h3>
                <div class="radio-group">
                    <div class="radio-item">
                        <input type="radio" id="q20" name="questionCount" value="20">
                        <label for="q20">20 Fragen</label>
                    </div>
                    <div class="radio-item">
                        <input type="radio" id="q30" name="questionCount" value="30" checked>
                        <label for="q30">30 Fragen</label>
                    </div>
                    <div class="radio-item">
                        <input type="radio" id="q40" name="questionCount" value="40">
                        <label for="q40">40 Fragen</label>
                    </div>
                    <div class="radio-item">
                        <input type="radio" id="qCustom" name="questionCount" value="custom">
                        <label for="qCustom">Eigene Anzahl:</label>
                    </div>
                </div>
                <div id="customNumberContainer" class="custom-number-input" style="display: none;">
                    <label for="customNumber">Anzahl Fragen:</label>
                    <input type="number" id="customNumber" min="1" max="200" value="50">
                </div>
            </div>

            <div id="errorMessage" class="error-message"></div>

            <button class="start-btn" onclick="startQuiz()">Quiz starten 🎶</button>
        </div>

        <!-- Quiz-Bildschirm -->
        <div id="quizScreen" class="hidden">
            <div class="quiz-info">
                <p>Frage <span id="currentQuestion">1</span> von <span id="totalQuestions">40</span></p>
                <p style="margin-top: 10px;">Punkte: <span id="score">0</span></p>
            </div>

            <div class="progress-bar">
                <div id="progressBar" class="progress-fill">0%</div>
            </div>

            <div class="question-container">
                <div id="question" class="question"></div>
                <div id="answers" class="answers"></div>
            </div>

            <button id="nextBtn" class="next-btn hidden" onclick="nextQuestion()">Nächste Frage →</button>
        </div>

        <!-- Ergebnis-Bildschirm -->
        <div id="resultScreen" class="result-screen">
            <h2>Quiz beendet! 🎉</h2>
            <div class="score-display">
                <span id="finalScore">0</span> / <span id="finalTotal">40</span>
            </div>
            <div class="stars" id="starRating"></div>
            <p id="resultMessage" style="font-size: 1.4em; color: #333; margin: 20px 0;"></p>
            <button class="restart-btn" onclick="location.reload()">Noch einmal spielen</button>
        </div>
    </div>

        function startQuiz() {
            const errorMsg = document.getElementById('errorMessage');
            errorMsg.style.display = 'none';

            // Kategorien sammeln
            const selectedCategories = [];
            document.querySelectorAll('input[type="checkbox"]:checked').forEach(cb => {
                selectedCategories.push(cb.value);
            });

            if (selectedCategories.length === 0) {
                errorMsg.textContent = 'Bitte wähle mindestens eine Kategorie aus!';
                errorMsg.style.display = 'block';
                return;
            }

            // Fragenanzahl ermitteln
            const selectedRadio = document.querySelector('input[name="questionCount"]:checked');
            let questionCount;

            if (selectedRadio.value === 'custom') {
                questionCount = parseInt(document.getElementById('customNumber').value);
                if (isNaN(questionCount) || questionCount < 1) {
                    errorMsg.textContent = 'Bitte gib eine gültige Anzahl an Fragen ein!';
                    errorMsg.style.display = 'block';
                    return;
                }
            } else {
                questionCount = parseInt(selectedRadio.value);
            }

            // Fragen filtern nach Kategorien
            let availableQuestions = allQuestions.filter(q => selectedCategories.includes(q.cat));

            if (availableQuestions.length === 0) {
                errorMsg.textContent = 'Keine Fragen für die gewählten Kategorien verfügbar!';
                errorMsg.style.display = 'block';
                return;
            }

            // Wenn mehr Fragen gewünscht als verfügbar, alle nehmen
            if (questionCount > availableQuestions.length) {
                questionCount = availableQuestions.length;
            }

            // Fragen mischen und auswählen
            shuffleArray(availableQuestions);
            questions = availableQuestions.slice(0, questionCount);

            // Quiz starten
            currentQuestionIndex = 0;
            score = 0;
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('quizScreen').classList.remove('hidden');
            document.getElementById('totalQuestions').textContent = questions.length;
            showQuestion();
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function showQuestion() {
            answered = false;
            const question = questions[currentQuestionIndex];

            document.getElementById('currentQuestion').textContent = currentQuestionIndex + 1;
            document.getElementById('question').textContent = question.q;

            const answersContainer = document.getElementById('answers');
            answersContainer.innerHTML = '';

            // Antworten mit Index-Mapping shuffeln
            const shuffledAnswers = question.a.map((answer, index) => ({
                text: answer,
                isCorrect: index === question.c
            }));

            shuffleArray(shuffledAnswers);

            // Buttons erstellen
            shuffledAnswers.forEach((item) => {
                const btn = document.createElement('button');
                btn.className = 'answer-btn';
                btn.textContent = item.text;
                btn.onclick = () => checkAnswer(item.isCorrect);
                answersContainer.appendChild(btn);
            });

            document.getElementById('nextBtn').classList.add('hidden');
            updateProgress();
        }

        function checkAnswer(isCorrect) {
            if (answered) return;

            answered = true;
            const question = questions[currentQuestionIndex];
            const correctAnswer = question.a[question.c];
            const buttons = document.querySelectorAll('.answer-btn');

            buttons.forEach((btn) => {
                btn.classList.add('disabled');

                // Korrekte Antwort grün markieren
                if (btn.textContent === correctAnswer) {
                    btn.classList.add('correct');
                }

                // Wenn falsche Antwort geklickt wurde, rot markieren
                if (!isCorrect && btn.textContent !== correctAnswer) {
                    // Prüfen ob dieser Button geklickt wurde
                    if (event && event.target === btn) {
                        btn.classList.add('wrong');
                    }
                }
            });

            if (isCorrect) {
                score++;
                createStars();
                document.getElementById('score').textContent = score;
            } else {
                // Falsch geklickten Button markieren
                event.target.classList.add('wrong');
            }

            document.getElementById('nextBtn').classList.remove('hidden');
        }

        function nextQuestion() {
            currentQuestionIndex++;

            if (currentQuestionIndex < questions.length) {
                showQuestion();
            } else {
                showResults();
            }
        }

        function updateProgress() {
            const progress = ((currentQuestionIndex + 1) / questions.length) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
            document.getElementById('progressBar').textContent = Math.round(progress) + '%';
        }

        function showResults() {
            document.getElementById('quizScreen').classList.add('hidden');
            const resultScreen = document.getElementById('resultScreen');
            resultScreen.classList.remove('hidden');
            resultScreen.classList.add('celebration');

            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalTotal').textContent = questions.length;

            const percentage = (score / questions.length) * 100;
            let stars = '';
            let message = '';

            if (percentage >= 90) {
                stars = '⭐⭐⭐⭐⭐';
                message = 'Fantastisch! Du bist ein wahrer Musik-Experte! 🎉';
            } else if (percentage >= 75) {
                stars = '⭐⭐⭐⭐';
                message = 'Sehr gut! Du kennst dich wirklich aus! 🎵';
            } else if (percentage >= 60) {
                stars = '⭐⭐⭐';
                message = 'Gut gemacht! Du hast solides Musikwissen! 🎶';
            } else if (percentage >= 40) {
                stars = '⭐⭐';
                message = 'Nicht schlecht! Es gibt noch viel zu entdecken! 🎼';
            } else {
                stars = '⭐';
                message = 'Das war ein Anfang! Übe weiter! 🎹';
            }

            document.getElementById('starRating').textContent = stars;
            document.getElementById('resultMessage').textContent = message;

            createCelebration();
        }

        function createStars() {
            for (let i = 0; i < 10; i++) {
                setTimeout(() => {
                    const star = document.createElement('div');
                    star.className = 'star';
                    star.textContent = '⭐';
                    star.style.left = Math.random() * 100 + '%';
                    document.body.appendChild(star);

                    setTimeout(() => star.remove(), 3000);
                }, i * 100);
            }
        }

        function createCelebration() {
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const star = document.createElement('div');
                    star.className = 'star';
                    star.textContent = ['⭐', '🎵', '🎶', '🎼'][Math.floor(Math.random() * 4)];
                    star.style.left = Math.random() * 100 + '%';
                    document.body.appendChild(star);

                    setTimeout(() => star.remove(), 3000);
                }, i * 50);
            }
        }
    </script>
</body>
</html>
